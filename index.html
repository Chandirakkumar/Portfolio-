<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chandirakkumar S | Elite Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Inter',sans-serif;
background:#05070d;
color:#fff;
overflow-x:hidden;
}

/* ================= CURSOR ================= */
.cursor{
width:20px;
height:20px;
border:2px solid #6366f1;
border-radius:50%;
position:fixed;
pointer-events:none;
z-index:9999;
transform:translate(-50%,-50%);
transition:0.1s;
}

/* ================= NAV ================= */
nav{
position:fixed;
width:100%;
padding:20px 60px;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(20px);
z-index:1000;
}

.nav-logo{
font-weight:700;
background:linear-gradient(135deg,#6366f1,#22c55e);
-webkit-background-clip:text;
color:transparent;
}

/* ================= HERO ================= */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
overflow:hidden;
}

/* PARALLAX BACKGROUND */
.hero::before{
content:'';
position:absolute;
width:800px;
height:800px;
background:radial-gradient(circle,#6366f1,transparent);
filter:blur(200px);
z-index:-1;
animation:move 10s infinite alternate;
}

@keyframes move{
to{transform:translateY(100px);}
}

.hero h1{
font-size:80px;
line-height:1.1;
}

.hero span{
background:linear-gradient(135deg,#6366f1,#22c55e);
-webkit-background-clip:text;
color:transparent;
}

/* ================= PROJECTS ================= */
section{padding:120px 80px;}

.projects{
display:flex;
gap:40px;
overflow-x:auto;
scroll-snap-type:x mandatory;
}

.card{
min-width:400px;
background:#0f172a;
border-radius:20px;
overflow:hidden;
position:relative;
scroll-snap-align:start;
transition:0.4s;
transform-style:preserve-3d;
}

/* 3D HOVER */
.card:hover{
transform:rotateY(8deg) scale(1.05);
}

/* IMAGE */
.card img{
width:100%;
height:250px;
object-fit:cover;
}

/* VIDEO */
.card video{
position:absolute;
top:0;
width:100%;
height:250px;
object-fit:cover;
opacity:0;
transition:0.3s;
}

.card:hover video{opacity:1}

/* TEXT */
.card-content{
padding:20px;
}

/* ================= SKILLS ================= */
.skills{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.skill{
padding:15px 25px;
border-radius:30px;
background:rgba(255,255,255,0.05);
transition:0.3s;
}

.skill:hover{
background:linear-gradient(135deg,#6366f1,#22c55e);
transform:scale(1.1);
}

/* ================= CONTACT ================= */
.contact{
text-align:center;
}

.btn{
display:inline-block;
margin-top:30px;
padding:15px 40px;
background:linear-gradient(135deg,#6366f1,#22c55e);
border-radius:40px;
text-decoration:none;
color:#fff;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 40px rgba(99,102,241,0.7);
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<!-- NAV -->
<nav>
<div class="nav-logo">Chandirakkumar S</div>
</nav>

<!-- HERO -->
<section class="hero">
<div>
<h1>Design <span>Experience</span><br>Not Slides</h1>
</div>
</section>

<!-- PROJECTS -->
<section>
<h2>Projects</h2>

<div class="projects">

<div class="card">
<img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f">
<video muted loop>
<source src="https://www.w3schools.com/html/mov_bbb.mp4">
</video>
<div class="card-content">PPT Design</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1574717024653-61fd2cf4d44d">
<video muted loop>
<source src="https://www.w3schools.com/html/movie.mp4">
</video>
<div class="card-content">Video Editing</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71">
<video muted loop>
<source src="https://www.w3schools.com/html/mov_bbb.mp4">
</video>
<div class="card-content">Storyline</div>
</div>

</div>

</section>

<!-- SKILLS -->
<section>
<h2>Skills</h2>

<div class="skills">
<div class="skill">PowerPoint</div>
<div class="skill">Storyline</div>
<div class="skill">Rise 360</div>
<div class="skill">Premiere Pro</div>
<div class="skill">After Effects</div>
</div>

</section>

<!-- CONTACT -->
<section class="contact">
<h2>Let’s Work Together</h2>
<a href="mailto:sv393015@gmail.com" class="btn">Hire Me</a>
</section>

<script>

/* CUSTOM CURSOR */
const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* VIDEO HOVER */
document.querySelectorAll(".card").forEach(card=>{
const video=card.querySelector("video");
card.addEventListener("mouseenter",()=>video.play());
card.addEventListener("mouseleave",()=>{
video.pause();
video.currentTime=0;
});
});

</script>

</body>
</html>
