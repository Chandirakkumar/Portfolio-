<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Instructional Designer & E-Learning Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=DM+Sans&family=DM+Mono&display=swap" rel="stylesheet">

<style>

/* YOUR ORIGINAL CSS KEPT */

/* ===== NEW ADDITIONS ===== */

/* DARK MODE */
body.dark{
  background:#0D0C0B;
  color:white;
}
body.dark nav{
  background:rgba(0,0,0,0.85);
}
body.dark .project-card{
  background:#1a1a1a;
}

/* VIDEO PREVIEW */
.project-video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:0.4s;
}
.project-card:hover .project-video{
  opacity:1;
}

/* MAGNET BUTTON */
.btn-primary{
  transition: transform 0.2s ease;
}

/* SMOOTH SCALE */
.project-card{
  transition: transform 0.4s ease;
}
.project-card:hover{
  transform: translateY(-6px) scale(1.01);
}

</style>
</head>

<body>

<!-- NAV -->
<nav id="mainNav">
  <a href="#hero" class="nav-logo">Arjun Rao</a>

  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#projects">Work</a></li>
    <li><a href="#casestudy">Case Study</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>

  <a href="#contact" class="nav-cta">Hire Me</a>

  <!-- DARK MODE BUTTON -->
  <button onclick="toggleTheme()" style="margin-left:20px;">🌙</button>

</nav>


<!-- HERO SAME -->


<!-- PROJECTS -->
<section id="projects">

<div class="projects-grid">

<!-- PPT PROJECT -->
<div class="project-card" onclick="openModal('modal-ppt')">

  <div class="project-img-wrap">

    <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=1400">

    <!-- VIDEO -->
    <video class="project-video" muted loop>
      <source src="https://www.w3schools.com/html/mov_bbb.mp4">
    </video>

  </div>

</div>


<!-- VIDEO PROJECT -->
<div class="project-card" onclick="openModal('modal-video')">

  <div class="project-img-wrap">

    <img src="https://images.unsplash.com/photo-1574717024653-61fd2cf4d44d?w=900">

    <video class="project-video" muted loop>
      <source src="https://www.w3schools.com/html/movie.mp4">
    </video>

  </div>

</div>


<!-- STORYLINE PROJECT -->
<div class="project-card" onclick="openModal('modal-storyline')">

  <div class="project-img-wrap">

    <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=1400">

    <video class="project-video" muted loop>
      <source src="https://www.w3schools.com/html/mov_bbb.mp4">
    </video>

  </div>

</div>

</div>
</section>


<!-- MODAL ENHANCED -->
<div id="modal-ppt" class="modal-overlay">
  <div class="modal-box">

    <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f">

    <div class="modal-body">

      <h3>Banking PPT</h3>

      <p>Advanced training deck</p>

      <!-- EXTRA IMAGES -->
      <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71" style="width:100%;margin-top:20px;">
      <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c" style="width:100%;margin-top:20px;">

    </div>

  </div>
</div>


<script>

/* DARK MODE */
function toggleTheme(){
  document.body.classList.toggle('dark');
}


/* MAGNET BUTTON */
document.querySelectorAll('.btn-primary').forEach(btn=>{
  btn.addEventListener('mousemove',e=>{
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width/2;
    const y = e.clientY - rect.top - rect.height/2;
    btn.style.transform = `translate(${x*0.2}px, ${y*0.2}px)`;
  });

  btn.addEventListener('mouseleave',()=>{
    btn.style.transform = `translate(0,0)`;
  });
});


/* VIDEO AUTOPLAY ON HOVER */
document.querySelectorAll('.project-card').forEach(card=>{
  const video = card.querySelector('video');

  card.addEventListener('mouseenter',()=>{
    video.play();
  });

  card.addEventListener('mouseleave',()=>{
    video.pause();
    video.currentTime = 0;
  });
});


/* PARALLAX */
window.addEventListener('scroll',()=>{
  const cards = document.querySelectorAll('.project-card');

  cards.forEach((card,i)=>{
    card.style.transform = `translateY(${window.scrollY * (0.02*(i+1))}px)`;
  });
});

</script>

</body>
</html>
