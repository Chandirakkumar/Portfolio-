<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chandirakkumar | Experience Designer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>

/* ===== GLOBAL ===== */
:root{
  --bg:#0a0f1c;
  --text:#e5e7eb;
  --accent:#3b82f6;
}

body{
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ===== NAV ===== */
nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:center;
  gap:40px;
  padding:15px;
  backdrop-filter:blur(10px);
  z-index:100;
}

nav a{
  color:white;
  cursor:pointer;
  text-decoration:none;
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:70px;
  background:linear-gradient(90deg,#3b82f6,#06b6d4);
  -webkit-background-clip:text;
  color:transparent;
}

.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.2;
  z-index:-1;
}

/* ===== SECTION ===== */
.section{
  padding:120px 20px;
  max-width:1200px;
  margin:auto;
}

/* ===== PROJECTS ===== */
.projects{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.project{
  position:relative;
  overflow:hidden;
  border-radius:14px;
}

.project video{
  width:100%;
  height:260px;
  object-fit:cover;
  transition:0.5s;
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(transparent,black);
  display:flex;
  flex-direction:column;
  justify-content:end;
  padding:20px;
  opacity:0;
  transition:0.4s;
}

.project:hover video{
  transform:scale(1.2);
}

.project:hover .overlay{
  opacity:1;
}

.overlay button{
  margin-top:10px;
  padding:8px;
  background:#3b82f6;
  border:none;
  color:white;
}

/* ===== CASE ===== */
.case{
  background:#111827;
  padding:30px;
  border-radius:14px;
}

.case h3{color:#3b82f6;}

/* ===== LIGHT MODE ===== */
.light{
  --bg:#ffffff;
  --text:#111;
}

/* ===== TOGGLE ===== */
.toggle{
  position:fixed;
  right:20px;
  top:20px;
  padding:10px;
  background:white;
  color:black;
  cursor:pointer;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .projects{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="toggle" onclick="toggle()">☀️</div>

<nav>
<a onclick="go('about')">About</a>
<a onclick="go('projects')">Work</a>
<a onclick="go('case')">Case Study</a>
</nav>

<!-- HERO -->
<section class="hero">
<video src="https://www.w3schools.com/howto/rain.mp4" autoplay muted loop></video>
<h1>Chandirakkumar</h1>
<p>Designing Learning Experiences</p>
</section>

<!-- ABOUT -->
<section id="about" class="section">
<h2>About</h2>
<p>I design systems, not slides. 100+ modules delivered.</p>
</section>

<!-- PROJECTS -->
<section id="projects" class="section">

<div class="projects">

<div class="project">
<video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay muted loop></video>
<div class="overlay">
<h3>PPT Training</h3>
<button onclick="go('case')">View Case</button>
</div>
</div>

<div class="project">
<video src="https://www.w3schools.com/html/movie.mp4" autoplay muted loop></video>
<div class="overlay">
<h3>Video Project</h3>
<button onclick="go('case')">View Case</button>
</div>
</div>

<div class="project">
<video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay muted loop></video>
<div class="overlay">
<h3>Storyline Simulation</h3>
<button onclick="go('case')">View Case</button>
</div>
</div>

</div>

</section>

<!-- CASE -->
<section id="case" class="section">

<div class="case">
<h3>Banking Simulation</h3>
<p><b>Problem:</b> Complex onboarding</p>
<p><b>Solution:</b> Interactive simulation</p>
<p><b>Result:</b> Increased engagement</p>
</div>

</section>

<script>

/* NAV SCROLL */
function go(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* DARK MODE */
function toggle(){
  document.body.classList.toggle("light");
}

/* GSAP */
gsap.from(".hero h1",{y:-80,opacity:0,duration:1});

gsap.utils.toArray(".section").forEach(sec=>{
  gsap.from(sec,{
    scrollTrigger:sec,
    y:100,
    opacity:0,
    duration:1
  });
});

</script>

</body>
</html>
