<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Chandirakkumar S | Executive Instructional Portfolio & Architecture Deck</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  
  <style>
    /* ==========================================================================
       ENTERPRISE TOKEN DESIGN SYSTEM (CSS CUSTOM PROPERTIES)
       ========================================================================== */
    :root {
      /* --- Color Palette Tokens --- */
      --bg-dark-900: #070a13;
      --bg-dark-800: #0b0f19;
      --bg-dark-700: #121826;
      --bg-dark-600: #151b2c;
      --bg-dark-500: #1e263f;
      --bg-dark-400: #2a3556;
      
      --accent-blue-base: #3b82f6;
      --accent-blue-bright: #60a5fa;
      --accent-blue-deep: #1d4ed8;
      --accent-purple-base: #8b5cf6;
      --accent-purple-bright: #a78bfa;
      --accent-teal-base: #10b981;
      --accent-orange-base: #f97316;
      
      --gradient-primary: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      --gradient-card-glow: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 60%);
      --gradient-hero-glow: radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.18) 0%, rgba(59, 130, 246, 0.05) 50%, transparent 100%);
      
      --text-primary: #f8fafc;
      --text-secondary: #e2e8f0;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      
      --border-thin: 1px solid rgba(255, 255, 255, 0.06);
      --border-medium: 1px solid rgba(255, 255, 255, 0.12);
      --border-accent-glow: 1px solid rgba(59, 130, 246, 0.3);
      
      /* --- Spacing Layout Scales --- */
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      --spacing-xxl: 48px;
      --spacing-giant: 64px;
      
      /* --- Timing & Animation Mechanics --- */
      --transition-fast: 0.15s ease;
      --transition-normal: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      --transition-slow: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      
      /* --- Layer Matrix Indexing (Z-Index) --- */
      --z-index-base: 1;
      --z-index-card: 10;
      --z-index-sticky: 100;
      --z-index-header: 1000;
      --z-index-overlay: 10000;
    }

    /* ==========================================================================
       DEFENSIVE RESET & GLOBAL BASE LAYERS
       ========================================================================== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      outline: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
      background-color: var(--bg-dark-900);
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-dark-800);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.714;
    }

    a, button {
      color: inherit;
      text-decoration: none;
      transition: all var(--transition-normal);
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    ul, ol {
      list-style: none;
    }

    /* ==========================================================================
       APEX STICKY GLOBAL HEADER MODULE
       ========================================================================== */
    header {
      position: sticky;
      top: 0;
      z-index: var(--z-index-header);
      background: rgba(11, 15, 25, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: var(--border-thin);
      width: 100%;
    }

    .nav-container {
      max-width: 1300px;
      margin: 0 auto;
      padding: var(--spacing-md) var(--spacing-lg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .brand-logo-wrapper {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .brand-logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.75px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      user-select: none;
    }

    .brand-indicator {
      width: 8px;
      height: 8px;
      background-color: var(--accent-teal-base);
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 10px var(--accent-teal-base);
    }

    nav ul {
      display: flex;
      align-items: center;
      list-style: none;
      gap: var(--spacing-xs);
      background: rgba(255, 255, 255, 0.02);
      padding: 6px;
      border-radius: 30px;
      border: var(--border-thin);
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 8px 24px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 20px;
      display: block;
      cursor: pointer;
    }

    nav a:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05);
    }

    nav a.active {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.09);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 24px;
      cursor: pointer;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      align-items: center;
      justify-content: center;
      border: var(--border-thin);
    }

    /* ==========================================================================
       HERO BILLBOARD (BIOGRAPHICAL MATRIX OVERLAY)
       ========================================================================== */
    .hero-billboard {
      max-width: 1300px;
      margin: var(--spacing-xl) auto;
      padding: 0 var(--spacing-lg);
      width: 100%;
    }

    .hero-wrapper {
      background: var(--gradient-hero-glow), var(--bg-dark-600);
      border: var(--border-thin);
      border-radius: 32px;
      padding: var(--spacing-xxl);
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: var(--spacing-giant);
      align-items: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }

    .profile-frame {
      position: relative;
      width: 260px;
      height: 260px;
      border-radius: 28px;
      background: var(--bg-dark-700);
      padding: 6px;
      border: var(--border-medium);
    }

    .profile-frame img {
      width: 100%;
      height: 100%;
      border-radius: 22px;
      object-fit: cover;
      filter: saturate(1.05);
      transition: transform var(--transition-slow);
    }

    .hero-wrapper:hover .profile-frame img {
      transform: scale(1.02);
    }

    .status-badge {
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent-teal-base);
      color: #ffffff;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 20px;
      letter-spacing: 1.2px;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-pulse-dot {
      width: 6px;
      height: 6px;
      background-color: #ffffff;
      border-radius: 50%;
      animation: statusPulse 2s infinite;
    }

    @keyframes statusPulse {
      0% { transform: scale(0.9); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.5; }
      100% { transform: scale(0.9); opacity: 1; }
    }

    .hero-meta h1 {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -1.75px;
      line-height: 1.05;
      margin-bottom: var(--spacing-sm);
      color: var(--text-primary);
    }

    .hero-meta h2 {
      font-size: 22px;
      font-weight: 500;
      color: var(--accent-blue-base);
      margin-bottom: var(--spacing-md);
      letter-spacing: -0.25px;
    }

    .hero-meta p {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 780px;
      margin-bottom: var(--spacing-xl);
      line-height: 1.65;
    }

    .meta-pills {
      display: flex;
      gap: var(--spacing-sm);
      flex-wrap: wrap;
    }

    .pill {
      background: rgba(255, 255, 255, 0.03);
      border: var(--border-thin);
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ==========================================================================
       CORE WORKSPACE STRUCTURAL SYSTEM (VIEW DECKS)
       ========================================================================== */
    main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 var(--spacing-lg) var(--spacing-giant);
      width: 100%;
    }

    .view-deck {
      display: none;
      width: 100%;
    }

    .view-deck.active {
      display: block;
      animation: deckShift var(--transition-slow);
    }

    @keyframes deckShift {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .deck-header-block {
      margin-bottom: var(--spacing-xxl);
      position: relative;
    }

    .deck-title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.75px;
      margin-bottom: var(--spacing-xs);
      color: var(--text-primary);
    }

    .deck-subtitle {
      color: var(--text-muted);
      font-size: 16px;
      max-width: 600px;
    }

    /* ==========================================================================
       DASHBOARD DECK VIEW (METRIC GRID GRAPHICS)
       ========================================================================== */
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: var(--spacing-lg);
      width: 100%;
    }

    .stat-card {
      background: var(--bg-dark-600);
      border: var(--border-thin);
      border-radius: 24px;
      padding: var(--spacing-xl);
      position: relative;
      transition: all var(--transition-normal);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 190px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 24px;
      background: var(--gradient-card-glow);
      opacity: 0.5;
      pointer-events: none;
    }

    .stat-card:hover {
      transform: translateY(-6px);
      border-color: rgba(59, 130, 246, 0.3);
      background: var(--bg-dark-500);
      box-shadow: 0 15px 35px rgba(59, 130, 246, 0.1);
    }

    .stat-icon-wrapper {
      font-size: 32px;
      margin-bottom: var(--spacing-md);
      background: rgba(255, 255, 255, 0.03);
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: var(--border-thin);
    }

    .stat-card h3 {
      font-size: 19px;
      font-weight: 700;
      margin-bottom: var(--spacing-xs);
      color: var(--text-primary);
      letter-spacing: -0.25px;
    }

    .stat-card p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ==========================================================================
       PRODUCTION VAULT DECK VIEW (SHOWCASE MEDIA)
       ========================================================================== */
    .showcase-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
      gap: var(--spacing-xl);
      width: 100%;
    }

    .showcase-card {
      background: var(--bg-dark-600);
      border: var(--border-thin);
      border-radius: 28px;
      overflow: hidden;
      transition: all var(--transition-normal);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
    }

    .showcase-card:hover {
      transform: translateY(-8px);
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
    }

    .media-vault {
      width: 100%;
      height: 230px;
      overflow: hidden;
      background: #010409;
      position: relative;
    }

    .media-vault img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.8;
      transition: transform var(--transition-slow), opacity var(--transition-normal);
    }

    .showcase-card:hover .media-vault img {
      transform: scale(1.05);
      opacity: 0.95;
    }

    .showcase-content {
      padding: var(--spacing-xl);
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .showcase-content h3 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: var(--spacing-xs);
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .showcase-content p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ==========================================================================
       COMPETENCY MATRIX DECK VIEW (SKILL ARCHITECTURES)
       ========================================================================== */
    .skills-matrix {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--spacing-lg);
      width: 100%;
    }

    .matrix-node {
      background: var(--bg-dark-600);
      border: var(--border-thin);
      border-radius: 24px;
      padding: var(--spacing-lg) var(--spacing-xl);
      display: flex;
      align-items: center;
      gap: var(--spacing-lg);
      transition: all var(--transition-normal);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    .matrix-node:hover {
      background: var(--bg-dark-500);
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-4px);
    }

    .node-graphic-wrapper {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .node-graphic-wrapper svg {
      width: 100%;
      height: 100%;
    }

    .node-info {
      flex: 1;
    }

    .node-info h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text-primary);
    }

    .node-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 800;
      color: var(--accent-blue-bright);
      background: rgba(59, 130, 246, 0.12);
      padding: 3px 12px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.75px;
      border: 1px solid rgba(59, 130, 246, 0.15);
    }
    
    .node-badge.expert {
      color: var(--accent-purple-bright);
      background: rgba(139, 92, 246, 0.12);
      border-color: rgba(139, 92, 246, 0.15);
    }

    /* ==========================================================================
       INBOUND COMMUNICATIONS HUB DECK VIEW (CONTACT LAYER)
       ========================================================================== */
    .hub-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--spacing-xl);
      align-items: start;
      width: 100%;
    }

    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: var(--spacing-lg);
    }

    .hub-tile {
      background: var(--bg-dark-600);
      border: var(--border-thin);
      border-radius: 24px;
      padding: var(--spacing-xl);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: var(--spacing-lg);
      min-height: 170px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
    }

    .hub-meta h3 {
      font-size: 13px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 6px;
      font-weight: 800;
    }

    .hub-meta p {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      word-break: break-all;
    }

    .action-anchor {
      background: rgba(255, 255, 255, 0.03);
      border: var(--border-thin);
      color: var(--text-primary);
      text-decoration: none;
      padding: 12px var(--spacing-md);
      border-radius: 14px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      display: block;
      cursor: pointer;
    }

    .action-anchor:hover {
      background: var(--text-primary);
      color: var(--bg-dark-900);
      font-weight: 700;
    }

    .presence-panel {
      background: linear-gradient(180deg, rgba(59, 130, 246, 0.08) 0%, transparent 100%), var(--bg-dark-600);
      border: var(--border-thin);
      border-radius: 28px;
      padding: var(--spacing-xxl) var(--spacing-xl);
      text-align: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    .presence-icon-avatar {
      width: 64px;
      height: 64px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--spacing-lg);
      color: var(--accent-blue-base);
      font-size: 28px;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .presence-panel h3 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: var(--spacing-sm);
      letter-spacing: -0.5px;
    }

    .presence-panel p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ==========================================================================
       MEDIA ADAPTATION RESPONSIVE MATRIX PLATES
       ========================================================================== */
    @media (max-width: 1024px) {
      .hero-wrapper {
        grid-template-columns: 1fr;
        gap: var(--spacing-xl);
        text-align: center;
        padding: var(--spacing-xl);
      }
      
      .profile-frame {
        margin: 0 auto;
      }
      
      .meta-pills {
        justify-content: center;
      }
      
      .hub-layout {
        grid-template-columns: 1fr;
        gap: var(--spacing-lg);
      }
    }

    @media (max-width: 768px) {
      .nav-container {
        padding: var(--spacing-md) var(--spacing-lg);
      }
      
      nav {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: var(--bg-dark-900);
        padding: var(--spacing-lg);
        border-bottom: var(--border-medium);
        box-shadow: 0 20px 30px rgba(0,0,0,0.5);
      }
      
      nav.open {
        display: block;
      }
      
      nav ul {
        flex-direction: column;
        background: none;
        border: none;
        padding: 0;
        gap: var(--spacing-sm);
      }
      
      nav a {
        display: block;
        text-align: center;
        padding: 12px;
        font-size: 16px;
      }
      
      .menu-toggle {
        display: flex;
      }
      
      .hero-billboard, main {
        padding: 0 var(--spacing-md) var(--spacing-xl);
      }
      
      .hero-wrapper {
        padding: 30px 20px;
      }
