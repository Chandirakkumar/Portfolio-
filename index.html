<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chandirakkumar | Dashboard Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:#0f172a;
color:#fff;
display:flex;
}

/* ===== SIDEBAR ===== */
.sidebar{
width:250px;
height:100vh;
background:#020617;
padding:30px;
display:flex;
flex-direction:column;
gap:30px;
}

.logo{
font-weight:700;
background:linear-gradient(135deg,#6366f1,#22c55e);
-webkit-background-clip:text;
color:transparent;
}

.menu a{
text-decoration:none;
color:#aaa;
padding:12px;
border-radius:8px;
display:block;
cursor:pointer;
transition:0.3s;
}

.menu a.active,
.menu a:hover{
background:#1e293b;
color:#fff;
}

/* ===== MAIN ===== */
.main{
flex:1;
padding:30px;
}

.section{
display:none;
}

.section.active{
display:block;
animation:fade 0.4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:#020617;
padding:20px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.project img{
width:100%;
border-radius:10px;
}

/* ===== BUTTON ===== */
.btn{
display:inline-block;
padding:10px 20px;
border-radius:10px;
background:linear-gradient(135deg,#6366f1,#22c55e);
color:#fff;
text-decoration:none;
margin-top:10px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">Chandirakkumar</div>

<div class="menu">
<a class="active" onclick="showSection('dashboard', this)">Dashboard</a>
<a onclick="showSection('projects', this)">Projects</a>
<a onclick="showSection('skills', this)">Skills</a>
<a onclick="showSection('contact', this)">Contact</a>
</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h2>Dashboard</h2>
<div class="grid">
<div class="card">100+ Modules</div>
<div class="card">4 Clients</div>
<div class="card">1+ Year Experience</div>
</div>
</div>

<!-- PROJECTS -->
<div id="projects" class="section">
<h2>Projects</h2>
<div class="grid">
<div class="card project">
<img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f">
<p>PPT Design</p>
</div>
<div class="card project">
<img src="https://images.unsplash.com/photo-1574717024653-61fd2cf4d44d">
<p>Video Editing</p>
</div>
<div class="card project">
<img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71">
<p>Storyline</p>
</div>
</div>
</div>

<!-- SKILLS -->
<div id="skills" class="section">
<h2>Skills</h2>
<div class="grid">
<div class="card">PowerPoint - 95%</div>
<div class="card">Storyline - 90%</div>
<div class="card">Premiere Pro - 85%</div>
</div>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
<h2>Contact</h2>
<p>Email: sv393015@gmail.com</p>
<a href="mailto:sv393015@gmail.com" class="btn">Send Mail</a>
</div>

</div>

<script>

function showSection(id, el){

// hide all
document.querySelectorAll('.section').forEach(sec=>{
sec.classList.remove('active');
});

// show selected
document.getElementById(id).classList.add('active');

// active menu
document.querySelectorAll('.menu a').forEach(link=>{
link.classList.remove('active');
});
el.classList.add('active');

}

</script>

</body>
</html>
